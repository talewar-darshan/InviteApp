name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sync-bot@github.com"
          git config --global user.name "GitHub Sync Bot"
          git remote add hfspace https://darshanTalewar:$HF_TOKEN@huggingface.co/spaces/darshanTalewar/InviteApp
          git push hfspace main --force
